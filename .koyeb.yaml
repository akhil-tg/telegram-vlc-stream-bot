name: telegram-vlc-stream-bot

services:
  - name: telegram-stream-bot
    type: web
    build:
      command: pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - port: 8000
        protocol: http
    env:
      - name: API_ID
      - name: API_HASH
      - name: BOT_TOKEN
      - name: URL
      - name: DATABASE_URL
      - name: ADMINS
      - name: LOG_CHANNEL
    health_checks:
      - http:
          port: 8000
          path: /
    instance_type: free
    regions:
      - fra